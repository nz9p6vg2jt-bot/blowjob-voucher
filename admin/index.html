<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voucher Admin</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-panel">
        <p class="eyebrow">Admin</p>
        <h1>Voucher Controls</h1>
        <p class="intro-copy">This first version stores redemptions on this device. Use these controls while testing.</p>

        <label class="field">
          <span>Passcode</span>
          <input id="passcode" type="password" inputmode="numeric" autocomplete="current-password" />
        </label>

        <div class="actions">
          <button class="primary-button" id="unlock" type="button">Unlock</button>
          <a class="secondary-button" href="../">Back</a>
        </div>

        <section class="admin-tools" id="tools" hidden>
          <div class="status-strip">
            <div>
              <span class="status-label">Redeemed</span>
              <strong id="adminRedeemed">0</strong>
            </div>
            <div>
              <span class="status-label">Remaining</span>
              <strong id="adminRemaining">0</strong>
            </div>
          </div>
          <button class="secondary-button" id="undo" type="button">Undo Last Redemption</button>
          <button class="secondary-button danger" id="reset" type="button">Reset All Vouchers</button>
        </section>
      </section>
    </main>

    <script src="../config.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
